<!-- Add id="loginModal" to the modal wrapper div -->

<!-- Example (your modal structure, just add the ids): -->
<div id="loginModal" class="modal"> <!-- ADD id="loginModal" -->
  <div class="modal-content">
    <form id="loginForm"> <!-- ADD id="loginForm" -->
      <!-- your existing inputs stay exactly the same -->
      <input type="email" placeholder="Email">
      <input type="password" placeholder="Password">
      <button type="submit">Sign In</button>
    </form>
    <p>Don't have an account?
      <a href="#" data-switch-signup>Sign up</a> <!-- ADD data-switch-signup -->
    </p>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
  6. dashboard.html — Replace hardcoded user values
     Add data-* attributes to the elements showing user data
  ══════════════════════════════════════════════════════════ -->

<!-- User name heading -->
<h1 data-user-fullname>Welcome back, Sarah!</h1>

<!-- Member since / rating line -->
<p data-member-since>Member since March 2023 • 4.9 ⭐ rating</p>

<!-- Stats numbers -->
<div class="stat-value" data-user-points>245</div>
<div class="stat-value" data-user-items-count>12</div>
<div class="stat-value" data-user-exchanges-count>28</div>

<!-- User avatar images -->
<img data-user-avatar src="assets/women1.jpg" alt="User Avatar">

<!-- Tab content containers — replace inner content with data attrs -->
<div class="tab-content" data-my-items>
  <!-- JS will render real items here -->
</div>

<div class="tab-content" data-my-exchanges>
  <!-- JS will render real orders here -->
</div>

<div class="tab-content" data-my-wishlist>
  <!-- JS will render real wishlist here -->
</div>

  <input type="text" name="firstName" value="Sarah Martinez">
  <input type="text" name="lastName" value="">
  <input type="email" value="sarah@email.com">
  <textarea name="bio">...</textarea>
  <input type="text" name="location" value="San Francisco, CA">
  <input type="text" name="preferredSizes" value="Tops: M">
  <button type="submit">Edit Profile</button>
</form>

  <textarea name="description">...</textarea>
  <select name="size">...</select>
  <select name="condition">...</select>
